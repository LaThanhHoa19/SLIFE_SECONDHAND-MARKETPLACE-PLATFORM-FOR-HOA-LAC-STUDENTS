name: slife-dev

services:
  mysql:
    image: mysql:8.0
    container_name: slife-dev-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-slife_db}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-123456}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../SLife_Database_MySQL:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER:-root} -p${MYSQL_PASSWORD:-123456} --silent"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    networks:
      - slife

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: slife-dev-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-slife_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-123456}
      VIETMAP_SERVICES_KEY: "f611ec02555463b634e15ce9863f305bb81a68f088bed048"
      APP_UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q 'UP'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 50s
    restart: unless-stopped
    networks:
      - slife

  frontend:
    image: node:20-alpine
    container_name: slife-dev-frontend-vite
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: /api
      # Tilemap key cho Vietmap (chỉ dùng trong dev, không commit key thật cho prod)
      VITE_VIETMAP_TILE_KEY: "b0168f754f2278ab2cdd5d100bdd678afa53b5eaae079649"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - slife

  nginx:
    image: nginx:1.27-alpine
    container_name: slife-dev-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - slife

volumes:
  mysql_data:
  frontend_node_modules:
  uploads_data:

networks:
  slife:
    driver: bridge