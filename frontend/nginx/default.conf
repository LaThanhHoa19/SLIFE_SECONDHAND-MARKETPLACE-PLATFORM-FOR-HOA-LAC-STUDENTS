server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /maps/ {
        proxy_pass https://maps.vietmap.vn;
        proxy_set_header Host maps.vietmap.vn;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
