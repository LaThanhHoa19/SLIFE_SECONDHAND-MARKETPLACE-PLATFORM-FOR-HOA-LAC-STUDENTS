spring.application.name=slife_db
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

jwt.secret=${JWT_SECRET:replace-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}
google.clientId=${GOOGLE_CLIENT_ID:318344558779-vee2ail43gcadoi97fo2q9122jm9qe7k.apps.googleusercontent.com}
google.clientSecret=${GOOGLE_CLIENT_SECRET:}

spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.username=${SPRING_MAIL_USERNAME:root}
spring.mail.password=${SPRING_MAIL_PASSWORD:An123An123}

app.scheduler.pickup-reminder-cron=0 */5 * * * *
app.scheduler.expire-listing-cron=0 0 * * * *

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}
