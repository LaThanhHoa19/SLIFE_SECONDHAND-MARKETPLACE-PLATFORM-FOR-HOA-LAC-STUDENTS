spring.application.name=slife_db
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database & Migration
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

# Security & OAuth2
jwt.secret=${JWT_SECRET:replace-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}
google.clientId=${GOOGLE_CLIENT_ID:replace-client-id}
google.clientSecret=${GOOGLE_CLIENT_SECRET:replace-client-secret}

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.username=${SPRING_MAIL_USERNAME:root}
spring.mail.password=${SPRING_MAIL_PASSWORD:An123}

# Schedulers
app.scheduler.pickup-reminder-cron=0 */5 * * * *
app.scheduler.expire-listing-cron=0 0 * * * *

# File Upload Configuration (From 'main')
app.upload.dir=${APP_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Debugging (From 'Hoa')
logging.level.org.springframework.security=DEBUG