spring.application.name=slife_db
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

jwt.secret=${JWT_SECRET:replace-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}
google.clientId=${GOOGLE_CLIENT_ID:replace-client-id}
google.clientSecret=${GOOGLE_CLIENT_SECRET:replace-client-secret}

spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.username=${SPRING_MAIL_USERNAME:root}
spring.mail.password=${SPRING_MAIL_PASSWORD:An123}

app.scheduler.pickup-reminder-cron=0 */5 * * * *
app.scheduler.expire-listing-cron=0 0 * * * *

logging.level.org.springframework.security=DEBUG