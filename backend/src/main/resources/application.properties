spring.application.name=slife_db
server.port=8080
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Upload limits (default Spring Boot chỉ 1MB - nâng lên 20MB cho ảnh listing)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Upload directory (absolute path nếu set qua ENV APP_UPLOAD_DIR)
app.upload.dir=${APP_UPLOAD_DIR:uploads}

spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true

jwt.secret=${JWT_SECRET:replace-secret}
jwt.expiration=${JWT_EXPIRATION:3600000}
google.clientId=${GOOGLE_CLIENT_ID:318344558779-vee2ail43gcadoi97fo2q9122jm9qe7k.apps.googleusercontent.com}
google.clientSecret=${GOOGLE_CLIENT_SECRET:}

spring.mail.host=${SPRING_MAIL_HOST:smtp.example.com}
spring.mail.username=${SPRING_MAIL_USERNAME:root}
spring.mail.password=${SPRING_MAIL_PASSWORD:an123456}

app.scheduler.pickup-reminder-cron=0 */5 * * * *
app.scheduler.expire-listing-cron=0 0 * * * *

app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.backend.url=${BACKEND_URL:http://localhost:8080}

# Vietmap (BE proxy) - cấu hình bằng ENV, KHÔNG commit key thật
vietmap.servicesKey=${VIETMAP_SERVICES_KEY:}
# Key hiển thị bản đồ (tile) — có thể trả về qua GET /api/geo/client-config khi FE chưa set VITE_VIETMAP_TILE_KEY
vietmap.tileKey=${VIETMAP_TILE_KEY:}
vietmap.baseUrl=${VIETMAP_BASE_URL:https://maps.vietmap.vn/api}
